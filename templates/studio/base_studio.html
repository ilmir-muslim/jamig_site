{% extends 'base.html' %}
{% load static %}

{% block header %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="studio-wrapper">
    <nav class="studio-sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-play-circle me-2"></i>
            <span>Джамиг Студия</span>
        </div>
        <ul class="sidebar-nav">
            <li>
                <a href="{% url 'studio_dashboard' %}" 
                   class="{% if request.resolver_match.url_name == 'studio_dashboard' %}active{% endif %}">
                    <i class="fas fa-chart-line"></i>
                    <span>Дашборд</span>
                </a>
            </li>
            <li>
                <a href="{% url 'studio_video_list' %}" 
                   class="{% if 'video' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="fas fa-video"></i>
                    <span>Видео</span>
                </a>
            </li>
            <li>
                <a href="{% url 'studio_audio_list' %}" 
                   class="{% if 'audio' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="fas fa-headphones"></i>
                    <span>Аудио</span>
                </a>
            </li>
            <li>
                <a href="{% url 'studio_text_list' %}" 
                   class="{% if 'text' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="fas fa-file-alt"></i>
                    <span>Статьи</span>
                </a>
            </li>
            <li>
                <a href="{% url 'studio_course_list' %}" 
                class="{% if 'course' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Курсы</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm w-100">
                <i class="fas fa-arrow-left me-1"></i> На сайт
            </a>
        </div>
    </nav>
    <main class="studio-main">
        <div class="container-fluid p-4">
            {% block studio_content %}{% endblock %}
        </div>
    </main>
</div>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/studio.css' %}">
{% endblock %}
