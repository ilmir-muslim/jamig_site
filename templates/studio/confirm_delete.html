{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h1>Удаление {{ type }}</h1>
    <p>Вы действительно хотите удалить "{{ object.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'studio_dashboard' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
