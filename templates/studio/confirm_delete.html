{% extends 'studio/base_studio.html' %}

{% block studio_content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="studio-card p-4 text-center">
            <i class="fas fa-exclamation-triangle text-warning mb-3" style="font-size: 3rem;"></i>
            <h5 class="mb-3">Удалить {{ type }}?</h5>
            <p class="mb-4">«{{ object.title }}» будет удалено безвозвратно.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4" style="border-radius: 10px;">
                    <i class="fas fa-trash-alt me-2"></i>Удалить
                </button>
                <a href="
                    {% if type == 'видео' %}{% url 'studio_video_list' %}
                    {% elif type == 'аудио' %}{% url 'studio_audio_list' %}
                    {% else %}{% url 'studio_text_list' %}
                    {% endif %}" class="btn btn-light ms-2 px-4" style="border-radius: 10px;">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
