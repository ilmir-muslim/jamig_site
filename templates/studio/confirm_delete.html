{% extends 'base.html' %}
{% block content %}
<div class="form-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 text-center" style="border-radius:16px;">
          <div class="card-body p-4">
            <i class="fas fa-exclamation-triangle text-warning mb-3" style="font-size: 2rem;"></i>
            <h5 class="mb-3">Удаление {{ type }}</h5>
            <p class="mb-4">Вы действительно хотите удалить <strong>«{{ object.title }}»</strong>? Это действие необратимо.</p>
            <form method="post">
              {% csrf_token %}
              <div class="d-flex justify-content-center gap-2">
                <button type="submit" class="btn btn-danger">
                  <i class="fas fa-trash-alt me-2"></i>Удалить
                </button>
                <a href="{% url 'studio_dashboard' %}" class="btn btn-outline-secondary">Отмена</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
