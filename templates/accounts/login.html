{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="form-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-6">
        <div class="card shadow-sm border-0" style="border-radius:16px; overflow:hidden;">
          <div class="row g-0">
            <div class="col-md-5 d-none d-md-flex register-left p-0">
              <img src="https://via.placeholder.com/600x800/2a5298/ffffff?text=Ваше+изображение" alt="" class="register-left-image">
            </div>
            <div class="col-md-7">
              <div class="card-body p-4">
                <h4 class="mb-4 fw-bold text-center">Вход</h4>
                <form method="post" novalidate>
                  {% csrf_token %}
                  <div class="mb-3">
                    <label class="form-label">Email</label>
                    {{ form.email }}
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    {{ form.password }}
                  </div>
                  <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>Войти
                  </button>
                </form>
                <hr>
                <p class="text-center mb-0">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
